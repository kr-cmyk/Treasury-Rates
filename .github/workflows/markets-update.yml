name: Markets Update Notifier

on:
  schedule:
    # Monday-Friday 7 AM PT = 2 PM UTC (14:00)
    - cron: '0 14 * * 1-5'

    # Monday-Friday 8 AM PT = 3 PM UTC (15:00)
    - cron: '0 15 * * 1-5'

    # Monday-Friday 9 AM PT = 4 PM UTC (16:00)
    - cron: '0 16 * * 1-5'

    # Monday-Friday 10 AM PT = 5 PM UTC (17:00)
    - cron: '0 17 * * 1-5'

    # Monday-Friday 11 AM PT = 6 PM UTC (18:00)
    - cron: '0 18 * * 1-5'

    # Monday-Friday 12 PM PT = 7 PM UTC (19:00)
    - cron: '0 19 * * 1-5'

    # Monday-Friday 1 PM PT = 8 PM UTC (20:00)
    - cron: '0 20 * * 1-5'

    # Monday-Friday 2 PM PT = 9 PM UTC (21:00)
    - cron: '0 21 * * 1-5'

  workflow_dispatch:  # Allows manual triggering
    inputs:
      reseed_baselines:
        description: 'One-shot: rewrite mtd_rates/ytd_rates from historical data (no message sent)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  send-markets-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install requests yfinance pytz python-dotenv

    - name: Run markets notifier
      env:
        SENDBLUE_API_KEY: ${{ secrets.SENDBLUE_API_KEY }}
        SENDBLUE_API_SECRET: ${{ secrets.SENDBLUE_API_SECRET }}
        SENDBLUE_FROM_NUMBER: ${{ secrets.SENDBLUE_FROM_NUMBER }}
        RECIPIENT_NUMBER: ${{ secrets.RECIPIENT_NUMBER }}
      run: |
        if [[ "${{ inputs.reseed_baselines }}" == "true" ]]; then
          python markets_notifier.py --reseed-baselines
        else
          python markets_notifier.py
        fi

    - name: Commit and push baseline updates
      run: |
        set -euo pipefail
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        if [[ -z "$(git status --porcelain)" ]]; then
          echo "No baseline changes to commit."
          exit 0
        fi
        git add -A
        git commit -m "Update baseline rates"
        branch="${GITHUB_REF#refs/heads/}"
        for attempt in 1 2 3 4; do
          if git push origin "HEAD:${branch}"; then
            exit 0
          fi
          echo "Push attempt ${attempt} rejected; rebasing on origin/${branch} and retrying..."
          git pull --rebase origin "${branch}"
          sleep $((attempt * 2))
        done
        echo "Push failed after 4 attempts." >&2
        exit 1
